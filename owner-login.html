<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Padmart — Owner Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="store.js"></script>
<style>
:root{--wine:#6d1f2a;--gold:#b88a4a;--muted:#7f6b62;--line:#e7d8c6;--paper:#fffaf3;--ink:#241817}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(circle at top right,rgba(109,31,42,.09),transparent 30%),
             linear-gradient(135deg,#f6ecdf 0%,#fbf7f0 50%,#f1e2d2 100%);
  display:flex;align-items:center;justify-content:center;padding:24px}
body.rtl{direction:rtl;font-family:'Vazirmatn',sans-serif}
.display{font-family:'Playfair Display',serif;font-weight:700}
.field{width:100%;border:1px solid var(--line);background:#fffdf9;border-radius:14px;padding:14px 16px;outline:none;font-family:inherit;font-size:15px;color:var(--ink);transition:.2s}
.field:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(109,31,42,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div class="fade" style="max-width:400px;width:100%">
  <div style="text-align:center;margin-bottom:32px">
    <a href="index.html" style="font-size:13px;color:var(--muted);text-decoration:none" id="back">← Back to Home</a>
    <div style="font-size:44px;margin:20px 0 10px">👑</div>
    <h1 class="display" style="font-size:28px;color:var(--wine)" id="ttl">Owner Login</h1>
    <p style="font-size:14px;color:var(--muted);margin-top:6px" id="sub">Enter your password to access the full dashboard</p>
  </div>
  <div style="background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:36px">
    <label style="display:block;font-size:13px;font-weight:600;margin-bottom:8px" id="lbl">Password</label>
    <input id="pass" class="field" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <div id="err" style="display:none;background:#f8e5e3;color:#8b2d36;border-radius:12px;padding:12px 16px;font-size:14px;margin-top:10px"></div>
    <button onclick="login()" style="width:100%;margin-top:18px;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--gold),#8a6030);color:#1e0f0f;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer" id="btn">Enter Dashboard</button>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:18px" id="hint">Demo password: <strong>admin123</strong></p>
  </div>
</div>
<script>
const L={en:{back:'← Back to Home',ttl:'Owner Login',sub:'Enter your password to access the full dashboard',lbl:'Password',btn:'Enter Dashboard',hint:'Demo password: admin123',err:'Incorrect password.'},fa:{back:'← بازگشت به صفحه اصلی',ttl:'ورود مدیر',sub:'رمز عبور خود را وارد کنید',lbl:'رمز عبور',btn:'ورود به داشبورد',hint:'رمز نمونه: admin123',err:'رمز عبور نادرست است.'}};
const lang=Store.getLang();
function applyL(l){document.body.classList.toggle('rtl',l==='fa');const LL=L[l];['back','ttl','sub','lbl','btn','hint'].forEach(k=>{const e=document.getElementById(k);if(e)e.textContent=LL[k];});}
function login(){const p=document.getElementById('pass').value;if(Store.ownerLogin(p)){location.href='owner.html';}else{const e=document.getElementById('err');e.textContent=L[lang].err;e.style.display='block';}}
applyL(lang);
</script>
</body>
</html>
