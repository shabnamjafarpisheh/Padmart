<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Padmart — Acting School</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="store.js"></script>
<style>
:root{--wine:#6d1f2a;--gold:#b88a4a;--muted:#7f6b62;--line:#e7d8c6;--paper:#fffaf3;--ink:#241817}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(circle at top right,rgba(109,31,42,.09),transparent 30%),
             linear-gradient(135deg,#f6ecdf 0%,#fbf7f0 50%,#f1e2d2 100%);
  display:flex;align-items:center;justify-content:center;padding:32px 20px}
body.rtl{direction:rtl;font-family:'Vazirmatn',sans-serif}
.display{font-family:'Playfair Display',serif;font-weight:700}
.lang-pill{display:inline-flex;background:#f0e4d4;border-radius:99px;padding:3px;gap:2px}
.lang-btn{padding:5px 16px;border-radius:99px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:.2s}
.lang-btn.active{background:var(--wine);color:#fff}
.gcard{border-radius:28px;padding:40px 28px;cursor:pointer;transition:all .25s;text-align:center}
.gcard:hover{transform:translateY(-6px)}
.gc-guest{background:var(--paper);border:1.5px solid var(--line)}
.gc-guest:hover{border-color:#c8aa92;box-shadow:0 20px 50px rgba(72,16,25,.1)}
.gc-owner{background:#1e0f0f;border:2px solid var(--gold)}
.gc-owner:hover{box-shadow:0 20px 50px rgba(72,16,25,.35)}
.iw{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block;margin:0 5px}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .6s ease both}
</style>
</head>
<body>
<div style="position:fixed;top:20px;right:20px;z-index:99">
  <div class="lang-pill">
    <button class="lang-btn active" onclick="setL('en')">EN</button>
    <button class="lang-btn" onclick="setL('fa')">FA</button>
  </div>
</div>

<div class="fade" style="text-align:center;max-width:620px;width:100%">
  <div style="font-size:60px;margin-bottom:14px">🎭</div>
  <h1 class="display" style="font-size:52px;color:var(--wine);line-height:1" id="ttl">Padmart</h1>
  <div style="display:flex;align-items:center;justify-content:center;margin:12px 0 52px">
    <div class="dot"></div>
    <span style="font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)" id="sub">Acting School · Hall Reservations</span>
    <div class="dot"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px">
    <div class="gcard gc-guest" onclick="location.href='guest.html'">
      <div class="iw" style="background:#f1dfd1">🎟</div>
      <div class="display" style="font-size:22px;color:var(--wine);margin-bottom:10px" id="gt">I'm a Guest</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:26px" id="gd">Book a hall, view and manage your own reservations</div>
      <div style="padding:13px 20px;background:var(--wine);border-radius:14px;color:#fff;font-weight:600;font-size:14px" id="gb">Enter as Guest →</div>
    </div>
    <div class="gcard gc-owner" onclick="location.href='owner-login.html'">
      <div class="iw" style="background:rgba(184,138,74,.18);border:1px solid var(--gold)">👑</div>
      <div class="display" style="font-size:22px;color:#fff;margin-bottom:10px" id="ot">Site Owner</div>
      <div style="font-size:13px;color:rgba(255,255,255,.62);line-height:1.7;margin-bottom:26px" id="od">Full dashboard — all reservations, analytics & settings</div>
      <div style="padding:13px 20px;background:var(--gold);border-radius:14px;color:#1e0f0f;font-weight:600;font-size:14px" id="ob">Owner Login →</div>
    </div>
  </div>
  <p style="font-size:13px;color:var(--muted)" id="tag">Grand Studio · Studio 2 · Choose Your Duration · Full Refund</p>
</div>

<script>
const L={
  en:{ttl:'Padmart',sub:'Acting School · Hall Reservations',gt:"I'm a Guest",gd:'Book a hall, view and manage your own reservations',gb:'Enter as Guest →',ot:'Site Owner',od:'Full dashboard — all reservations, analytics & settings',ob:'Owner Login →',tag:'Grand Studio · Studio 2 · Choose Your Duration · Full Refund'},
  fa:{ttl:'پادمارت',sub:'مدرسه بازیگری · رزرو سالن',gt:'مهمان هستم',gd:'رزرو سالن، مشاهده و مدیریت رزروهای خودم',gb:'ورود به عنوان مهمان ←',ot:'مدیر سایت',od:'داشبورد کامل — همه رزروها، آمار و تنظیمات',ob:'ورود مدیر ←',tag:'گرند استودیو · استودیو ۲ · انتخاب مدت زمان · بازپرداخت کامل'}
};
function setL(l){
  Store.setLang(l);
  document.body.classList.toggle('rtl',l==='fa');
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='en')||(i===1&&l==='fa')));
  const LL=L[l];
  ['ttl','sub','gt','gd','gb','ot','od','ob','tag'].forEach(k=>{const e=document.getElementById(k);if(e)e.textContent=LL[k];});
}
setL(Store.getLang());
lucide.createIcons();
</script>
</body>
</html>
